<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undisputed Music</title>
    <style>
        body { font-family: Arial; background: #121212; color: white; text-align: center; padding: 20px; }
        h1 { color: #1DB954; }
        .player { margin: 30px auto; max-width: 600px; background: #1f1f1f; padding: 20px; border-radius: 12px; }
        audio { width: 100%; margin: 15px 0; }
        button { background: #1DB954; color: black; border: none; padding: 12px 24px; margin: 5px; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Undisputed Music</h1>
    <p>Your own Spotify-style player</p>

    <div class="player">
        <h2>Now Playing: Sample Track</h2>
        <audio id="audioPlayer" controls>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
        
        <button onclick="playRandom()">Play Random Track</button>
        <button onclick="document.getElementById('audioPlayer').pause()">Pause</button>
    </div>

    <script>
        const tracks = [
            "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
            "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
            "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
        ];

        function playRandom() {
            const randomTrack = tracks[Math.floor(Math.random() * tracks.length)];
            const audio = document.getElementById('audioPlayer');
            audio.src = randomTrack;
            audio.play();
        }
    </script>

    <p><small>Free demo tracks • Add your own music later</small></p>
</body>
</html>
